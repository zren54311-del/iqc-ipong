<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IQC Clone</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
margin:0;
background:#0f0f12;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;
}

/* PHONE FRAME */
.phone{
width:390px;
height:844px;
background:#000;
border-radius:55px;
padding:15px;
box-shadow:0 40px 80px rgba(0,0,0,0.7);
position:relative;
overflow:hidden;
}

/* Dynamic Island */
.island{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
width:120px;
height:30px;
background:#000;
border-radius:20px;
z-index:10;
}

/* Status Bar */
.status{
position:absolute;
top:15px;
width:100%;
padding:0 25px;
display:flex;
justify-content:space-between;
color:white;
font-size:14px;
z-index:5;
}

/* Chat Background */
.chat{
position:absolute;
top:60px;
bottom:0;
left:0;
right:0;
background:url("https://i.imgur.com/8Km9tLL.jpg");
background-size:cover;
background-position:center;
padding:20px;
}

/* Blur overlay */
.chat::before{
content:"";
position:absolute;
inset:0;
backdrop-filter:blur(20px);
background:rgba(0,0,0,0.35);
}

/* Chat content */
.chat-content{
position:relative;
margin-top:40px;
}

/* Reaction Bar */
.reaction{
display:inline-flex;
gap:6px;
background:rgba(40,40,45,0.9);
padding:6px 12px;
border-radius:20px;
font-size:15px;
margin-bottom:6px;
box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

/* Bubble */
.bubble{
display:inline-block;
background:#2c2c2e;
color:white;
padding:12px 16px;
border-radius:22px;
max-width:75%;
font-size:16px;
line-height:1.4;
box-shadow:0 6px 15px rgba(0,0,0,0.4);
}

/* Time */
.time{
font-size:12px;
opacity:0.6;
margin-top:5px;
text-align:right;
}

/* Powered Text */
.powered{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
font-size:12px;
color:#aaa;
opacity:0.7;
}

/* Controls */
.controls{
position:fixed;
bottom:20px;
right:20px;
width:260px;
background:#1c1c1e;
padding:15px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
color:white;
}

input,textarea{
width:100%;
margin-bottom:8px;
padding:8px;
border-radius:10px;
border:none;
background:#2c2c2e;
color:white;
}

textarea{resize:none;height:60px;}

button{
width:100%;
padding:8px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#ff00cc,#3333ff);
color:white;
font-weight:bold;
cursor:pointer;
margin-top:5px;
}
</style>
</head>

<body>

<div class="phone" id="capture">

<div class="island"></div>

<div class="status">
<div id="statusTime">22:23</div>
<div>📶 100%</div>
</div>

<div class="chat">
<div class="chat-content">

<div class="reaction">👍 ❤️ 😂 😮 😢 🙏</div>

<div class="bubble">
<div id="chatText">Pesan akan muncul di sini</div>
<div class="time" id="chatTime">22:23</div>
</div>

</div>
</div>

<div class="powered">★ Powered by KalsNotDev ★</div>

</div>

<div class="controls">
<input type="time" id="inputTime">
<textarea id="inputMsg" placeholder="Tulis pesan..."></textarea>
<button onclick="generate()">Generate</button>
<button onclick="downloadImage()">Simpan PNG</button>
</div>

<script>
function generate(){
let msg=document.getElementById("inputMsg").value;
let time=document.getElementById("inputTime").value;

if(msg.trim()==""){alert("Isi pesan dulu 😭");return;}

if(time==""){
let now=new Date();
time=now.getHours().toString().padStart(2,'0')+":"+
now.getMinutes().toString().padStart(2,'0');
}

document.getElementById("chatText").innerText=msg;
document.getElementById("chatTime").innerText=time;
document.getElementById("statusTime").innerText=time;
}

function downloadImage(){
html2canvas(document.getElementById("capture"),{scale:2}).then(canvas=>{
let link=document.createElement("a");
link.download="chat.png";
link.href=canvas.toDataURL();
link.click();
});
}
</script>

</body>
</html>
