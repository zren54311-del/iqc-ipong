<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IQC Generator Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.container{
    width:380px;
    background:#111827;
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 40px rgba(0,0,0,0.6);
}

h2{
    text-align:center;
    margin-bottom:15px;
    background:linear-gradient(90deg,#ff00cc,#3333ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

input, textarea{
    width:100%;
    border:none;
    border-radius:12px;
    padding:8px;
    background:#1f2937;
    color:white;
    margin-bottom:8px;
    font-size:14px;
}

textarea{
    height:70px;
    resize:none;
}

button{
    width:100%;
    padding:10px;
    margin-top:6px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#ff00cc,#3333ff);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.preview{
    margin-top:20px;
    padding:20px;
    background:#000;
    border-radius:20px;
    display:none;
}

.chatHeader{
    display:flex;
    align-items:center;
    margin-bottom:10px;
}

.avatar{
    width:35px;
    height:35px;
    border-radius:50%;
    background:#444;
    margin-right:10px;
    object-fit:cover;
}

.username{
    font-weight:bold;
    font-size:14px;
}

.reaction{
    background:#2d3748;
    padding:5px 10px;
    border-radius:20px;
    display:inline-block;
    font-size:14px;
    margin-bottom:8px;
}

.bubble{
    background:#1f2937;
    padding:12px 15px;
    border-radius:20px;
    display:inline-block;
    max-width:80%;
}

.time{
    font-size:11px;
    opacity:0.6;
    margin-top:5px;
    text-align:right;
}
</style>
</head>
<body>

<div class="container">
    <h2>IQC Generator Pro</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="time" id="time">
    <input type="file" id="avatarInput" accept="image/*">
    <textarea id="message" placeholder="Tulis pesan..."></textarea>

    <button onclick="generate()">Generate</button>
    <button onclick="downloadImage()">Download PNG</button>

    <div class="preview" id="chatPreview">
        <div class="chatHeader">
            <img id="avatarPreview" class="avatar">
            <div class="username" id="usernamePreview"></div>
        </div>

        <div class="reaction">👍 ❤️ 😂 😮 😢 🙏</div>

        <div class="bubble">
            <div id="chatText"></div>
            <div class="time" id="chatTime"></div>
        </div>
    </div>
</div>

<script>
let avatarData = "";

document.getElementById("avatarInput").addEventListener("change", function(e){
    const reader = new FileReader();
    reader.onload = function(){
        avatarData = reader.result;
    }
    reader.readAsDataURL(e.target.files[0]);
});

function generate(){
    const user = document.getElementById("username").value;
    const msg = document.getElementById("message").value;
    let time = document.getElementById("time").value;

    if(msg.trim() === ""){
        alert("Isi pesan dulu bro 😭");
        return;
    }

    if(time === ""){
        const now = new Date();
        time = now.getHours().toString().padStart(2,'0') + ":" +
               now.getMinutes().toString().padStart(2,'0');
    }

    document.getElementById("usernamePreview").innerText = user || "User";
    document.getElementById("chatText").innerText = msg;
    document.getElementById("chatTime").innerText = time;

    if(avatarData !== ""){
        document.getElementById("avatarPreview").src = avatarData;
    } else {
        document.getElementById("avatarPreview").src = "";
    }

    document.getElementById("chatPreview").style.display = "block";
}

function downloadImage(){
    const preview = document.getElementById("chatPreview");

    html2canvas(preview).then(canvas => {
        const link = document.createElement("a");
        link.download = "chat.png";
        link.href = canvas.toDataURL();
        link.click();
    });
}
</script>

</body>
    </html>
