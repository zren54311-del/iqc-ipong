<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQC FAKE IP · Notif Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        body {
            background: #0b0f15;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            max-width: 420px;
            width: 100%;
            background: #1a1e26;
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }
        .preview {
            background: #0e121c;
            border-radius: 28px;
            padding: 24px 20px;
            margin-bottom: 24px;
            border: 1px solid #2f3542;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #e9edf5;
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 20px;
        }
        .time {
            background: #252b38;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 15px;
        }
        .battery {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #252b38;
            padding: 6px 14px;
            border-radius: 40px;
        }
        .battery-level {
            font-weight: 600;
        }
        .battery-icon {
            width: 24px;
            height: 12px;
            border: 2px solid #b9c6db;
            border-radius: 3px;
            position: relative;
        }
        .battery-icon::after {
            content: '';
            position: absolute;
            right: -4px;
            top: 2px;
            width: 3px;
            height: 4px;
            background: #b9c6db;
            border-radius: 1px;
        }
        .battery-fill {
            height: 100%;
            background: #4caf92;
            width: 70%; /* default, nanti diubah JS */
            border-radius: 1px;
        }
        .provider {
            background: #252b38;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            color: #b9c6db;
        }
        .message-box {
            background: #1f2532;
            border-radius: 26px;
            padding: 22px 18px;
            margin-top: 12px;
            border: 1px solid #363e4e;
        }
        .message-label {
            color: #7a849b;
            font-size: 13px;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .message-content {
            color: #f0f4ff;
            font-size: 26px;
            font-weight: 600;
            word-break: break-word;
            line-height: 1.3;
        }
        .control-panel {
            background: #121720;
            border-radius: 24px;
            padding: 22px;
            border: 1px solid #2b3240;
        }
        .control-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            color: #9aa7c2;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }
        input, select {
            width: 100%;
            background: #1e2532;
            border: 1px solid #384153;
            border-radius: 16px;
            padding: 14px 16px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }
        input:focus, select:focus {
            border-color: #6d7f9e;
        }
        .row {
            display: flex;
            gap: 12px;
        }
        .row > * {
            flex: 1;
        }
        .btn {
            background: #2d3b52;
            border: none;
            border-radius: 40px;
            padding: 16px 24px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            margin-top: 12px;
            border: 1px solid #4d607c;
        }
        .btn:hover {
            background: #3f506b;
        }
        .btn-save {
            background: #1f5f4c;
            border-color: #2e8b70;
        }
        .btn-save:hover {
            background: #2b7a63;
        }
        .footer-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            flex-wrap: wrap;
            justify-content: center;
            color: #5d6b83;
            font-size: 13px;
        }
        .footer-actions span {
            background: #1b212e;
            padding: 6px 14px;
            border-radius: 40px;
            cursor: default;
        }
    </style>
    <!-- html2canvas untuk simpan gambar -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div class="card" id="card">
    <!-- AREA PREVIEW (yang akan di-screenshot) -->
    <div class="preview" id="previewArea">
        <div class="status-bar">
            <div class="time" id="timeDisplay">22:23</div>
            <div class="battery">
                <span class="battery-level" id="batteryDisplay">100</span>
                <div class="battery-icon">
                    <div class="battery-fill" id="batteryFill" style="width: 100%;"></div>
                </div>
            </div>
            <div class="provider" id="providerDisplay">Telkomsel</div>
        </div>
        <div class="message-box">
            <div class="message-label">PESAN</div>
            <div class="message-content" id="messageDisplay">kaloq</div>
        </div>
    </div>

    <!-- KONTROL SETTINGS -->
    <div class="control-panel">
        <div class="control-group">
            <label>✏️ Pesan</label>
            <input type="text" id="inputMessage" value="kaloq" placeholder="Teks pesan...">
        </div>
        <div class="row">
            <div class="control-group">
                <label>⏰ Waktu</label>
                <input type="text" id="inputTime" value="22:23" placeholder="Contoh: 22:23">
            </div>
            <div class="control-group">
                <label>🔋 Baterai (%)</label>
                <input type="number" id="inputBattery" value="100" min="0" max="100" step="1">
            </div>
        </div>
        <div class="control-group">
            <label>📶 Provider</label>
            <select id="inputProvider">
                <option value="Telkomsel" selected>Telkomsel</option>
                <option value="Indosat">Indosat</option>
                <option value="XL">XL</option>
                <option value="Tri">Tri</option>
                <option value="Smartfren">Smartfren</option>
                <option value="by.u">by.u</option>
                <option value="Axis">Axis</option>
                <option value="WiFi">WiFi</option>
                <option value="Lainnya">Lainnya</option>
            </select>
        </div>
        <button class="btn" id="updateBtn">🔄 UPDATE PREVIEW</button>
        <button class="btn btn-save" id="saveBtn">📸 SIMPAN GAMBAR</button>

        <div class="footer-actions">
            <span>Beri Bintang</span>
            <span>Balas</span>
            <span>Teruskan</span>
            <span>Salin</span>
            <span>Ucapkan</span>
            <span>Laporkan</span>
            <span>Hapus</span>
        </div>
    </div>
</div>

<script>
    (function() {
        // elemen display
        const timeDisplay = document.getElementById('timeDisplay');
        const batteryDisplay = document.getElementById('batteryDisplay');
        const batteryFill = document.getElementById('batteryFill');
        const providerDisplay = document.getElementById('providerDisplay');
        const messageDisplay = document.getElementById('messageDisplay');

        // input
        const inputMessage = document.getElementById('inputMessage');
        const inputTime = document.getElementById('inputTime');
        const inputBattery = document.getElementById('inputBattery');
        const inputProvider = document.getElementById('inputProvider');

        // tombol
        const updateBtn = document.getElementById('updateBtn');
        const saveBtn = document.getElementById('saveBtn');

        // fungsi update tampilan
        function updatePreview() {
            // pesan
            messageDisplay.textContent = inputMessage.value || ' ';

            // waktu
            timeDisplay.textContent = inputTime.value || '--:--';

            // baterai
            let batVal = parseInt(inputBattery.value, 10);
            if (isNaN(batVal)) batVal = 0;
            if (batVal < 0) batVal = 0;
            if (batVal > 100) batVal = 100;
            batteryDisplay.textContent = batVal;
            batteryFill.style.width = batVal + '%';

            // warna baterai kalau rendah
            if (batVal <= 15) {
                batteryFill.style.background = '#f28b82';
            } else if (batVal <= 30) {
                batteryFill.style.background = '#fdd663';
            } else {
                batteryFill.style.background = '#4caf92';
            }

            // provider
            providerDisplay.textContent = inputProvider.value;
        }

        // event update
        updateBtn.addEventListener('click', updatePreview);

        // biar realtime juga saat input berubah (opsional)
        inputMessage.addEventListener('input', updatePreview);
        inputTime.addEventListener('input', updatePreview);
        inputBattery.addEventListener('input', updatePreview);
        inputProvider.addEventListener('change', updatePreview);

        // inisialisasi pertama
        updatePreview();

        // SIMPAN GAMBAR (pakai html2canvas)
        saveBtn.addEventListener('click', function() {
            const area = document.getElementById('previewArea');
            // paksa area keliatan jelas
            html2canvas(area, {
                scale: 1.8,               // biar tajam
                backgroundColor: '#0e121c', // cocokin background preview
                allowTaint: false,
                useCORS: true,
                logging: false
            }).then(canvas => {
                // buat link download
                const link = document.createElement('a');
                link.download = `IQC_FAKE_${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            }).catch(err => {
                alert('Gagal simpan gambar: ' + err);
            });
        });

        // tambahan: klik footer ga ngapa2in (cuma hiasan)
        // biar mirip asli
    })();
</script>
