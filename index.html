<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IQC FAKE IP · generator notif</title>
    <!-- html2canvas untuk simpan gambar -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: #0c0f14;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .container {
            max-width: 420px;
            width: 100%;
            background: #1a1e27;
            border-radius: 28px;
            padding: 24px 20px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.8);
            border: 1px solid #2d3440;
        }
        h1 {
            color: #e0e6f0;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 24px;
        }
        .input-group {
            margin-bottom: 18px;
        }
        .label {
            color: #8f9bb5;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            display: block;
        }
        .input-field {
            width: 100%;
            background: #252d3a;
            border: 1px solid #3f4a5b;
            border-radius: 18px;
            padding: 14px 18px;
            color: white;
            font-size: 16px;
            outline: none;
        }
        .input-field:focus {
            border-color: #6d7f9e;
        }
        .row {
            display: flex;
            gap: 12px;
        }
        .row .input-group {
            flex: 1;
        }
        .btn {
            background: #2f3b4e;
            border: 1px solid #50607a;
            border-radius: 40px;
            padding: 16px;
            font-weight: 600;
            font-size: 18px;
            color: white;
            width: 100%;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 12px;
        }
        .btn-primary {
            background: #1f5f4c;
            border-color: #2e8b70;
        }
        .btn-primary:hover {
            background: #2b7a63;
        }
        .btn:hover {
            background: #3f506b;
        }
        /* area hasil (muncul setelah generate) */
        .result-area {
            margin-top: 24px;
            border-top: 1px solid #313a48;
            padding-top: 24px;
        }
        .status-label {
            color: #aab7d2;
            font-size: 16px;
            margin-bottom: 16px;
            font-weight: 500;
        }
        .bubble {
            background: #262f3e;
            border-radius: 24px;
            padding: 18px 20px;
            margin-bottom: 20px;
            border: 1px solid #414e62;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }
        .bubble-message {
            color: white;
            font-size: 32px;
            font-weight: 600;
            line-height: 1.3;
            word-break: break-word;
            margin-bottom: 8px;
        }
        .bubble-time {
            color: #9da9c2;
            font-size: 18px;
            font-weight: 500;
        }
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 24px;
            justify-content: center;
        }
        .action-btn {
            background: #232b38;
            border: 1px solid #3e495b;
            border-radius: 40px;
            padding: 10px 18px;
            color: #ccd6f0;
            font-size: 14px;
            font-weight: 500;
            cursor: default;
            transition: 0.1s;
        }
        /* tombol simpan gambar terpisah */
        .btn-save {
            background: #2d3b52;
            border-color: #4d607c;
            margin-top: 8px;
        }
        .btn-save:hover {
            background: #3f506b;
        }
        .hidden {
            display: none;
        }
        .back-link {
            color: #7b89a4;
            text-align: center;
            margin-top: 16px;
            cursor: pointer;
            font-size: 15px;
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <!-- judul -->
    <h1>IQC FAKE IP</h1>

    <!-- FORM INPUT (awalnya muncul) -->
    <div id="inputForm">
        <div class="input-group">
            <span class="label">WAKTU</span>
            <input type="text" class="input-field" id="timeInput" placeholder="contoh: 22:23" value="22:23">
        </div>
        <div class="row">
            <div class="input-group">
                <span class="label">BATERAI</span>
                <input type="number" class="input-field" id="batteryInput" value="100" min="0" max="100">
            </div>
            <div class="input-group">
                <span class="label">PROVIDER</span>
                <input type="text" class="input-field" id="providerInput" placeholder="Telkomsel, Axis, ..." value="Telkomsel">
            </div>
        </div>
        <div class="input-group">
            <span class="label">PESAN</span>
            <input type="text" class="input-field" id="messageInput" placeholder="Teks pesan" value="kaloq">
        </div>
        <button class="btn btn-primary" id="generateBtn">GENERATE</button>
    </div>

    <!-- AREA HASIL (awalnya tersembunyi) -->
    <div id="resultSection" class="result-area hidden">
        <div class="status-label">SELESAI, BOS!</div>

        <!-- bubble notifikasi yang akan di-screenshot -->
        <div id="captureArea">
            <div class="bubble">
                <div class="bubble-message" id="resultMessage">kalo</div>
                <div class="bubble-time" id="resultTime">22:23</div>
            </div>

            <!-- tombol aksi (juga ikut ke screenshot) -->
            <div class="action-buttons" id="actionButtons">
                <span class="action-btn">Beri Bintang</span>
                <span class="action-btn">Balas</span>
                <span class="action-btn">Teruskan</span>
                <span class="action-btn">Salin</span>
                <span class="action-btn">Ucapkan</span>
                <span class="action-btn">Laporkan</span>
                <span class="action-btn">Hapus</span>
            </div>
        </div>

        <!-- tombol simpan gambar -->
        <button class="btn btn-save" id="saveImageBtn">SIMPAN GAMBAR</button>
        <div class="back-link" id="backBtn">↩️ Buat ulang</div>
    </div>
</div>

<script>
    (function() {
        // elemen form
        const timeInput = document.getElementById('timeInput');
        const batteryInput = document.getElementById('batteryInput');
        const providerInput = document.getElementById('providerInput');
        const messageInput = document.getElementById('messageInput');
        const generateBtn = document.getElementById('generateBtn');

        // elemen hasil
        const resultSection = document.getElementById('resultSection');
        const inputForm = document.getElementById('inputForm');
        const resultMessage = document.getElementById('resultMessage');
        const resultTime = document.getElementById('resultTime');
        const saveBtn = document.getElementById('saveImageBtn');
        const backBtn = document.getElementById('backBtn');

        // area yang akan dicapture (bubble + action buttons)
        const captureArea = document.getElementById('captureArea');

        // tombol generate
        generateBtn.addEventListener('click', function() {
            // ambil nilai dari input
            let message = messageInput.value.trim();
            if (message === '') message = ' '; // spasi biar tidak kosong

            let time = timeInput.value.trim();
            if (time === '') time = '--:--';

            // set ke elemen hasil
            resultMessage.textContent = message;
            resultTime.textContent = time;

            // sembunyikan form, tampilkan hasil
            inputForm.classList.add('hidden');
            resultSection.classList.remove('hidden');
        });

        // tombol kembali ke form
        backBtn.addEventListener('click', function() {
            resultSection.classList.add('hidden');
            inputForm.classList.remove('hidden');
        });

        // simpan gambar (screenshot area capture)
        saveBtn.addEventListener('click', function() {
            html2canvas(captureArea, {
                scale: 2,
                backgroundColor: '#1a1e27', // warna background container (biar nyambung)
                allowTaint: false,
                useCORS: true,
                logging: false
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `IQC_${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            }).catch(err => {
                alert('Gagal simpan: ' + err);
            });
        });

        // opsional: isi default sesuai gambar biar mirip
        // udah di set di value
    })();
</script>

<!-- catatan: baterai dan provider cuma muncul di form, tidak di hasil akhir, sesuai contoh gambar -->
</body>
    </html>
