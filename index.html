<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Quote Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        #canvas-area { width: 350px; height: 500px; position: relative; overflow: hidden; border-radius: 24px; background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
    </style>
</head>
<body class="p-6 flex flex-col items-center">

    <h2 class="text-2xl font-bold mb-6 text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-400">
        Quote Creator
    </h2>

    <div id="canvas-area" class="shadow-2xl flex flex-col p-8 justify-between">
        <div class="flex justify-between items-center text-xs opacity-80">
            <span id="prev-operator">Carrier</span>
            <div class="flex gap-2">
                <span id="prev-time">12:00</span>
                <span id="prev-battery">100%</span>
            </div>
        </div>

        <div class="glass p-6 rounded-2xl">
            <p id="prev-text" class="text-xl font-medium leading-relaxed">Masukkan kutipan Anda di sini...</p>
            <div class="mt-4 border-t border-white/10 pt-4 text-sm opacity-60 italic">
                — Anonymous
            </div>
        </div>

        <div class="text-center text-[10px] opacity-40 uppercase tracking-widest">
            Generated by MyWeb
        </div>
    </div>

    <div class="mt-8 w-full max-w-md glass p-6 rounded-3xl space-y-4">
        <div>
            <label class="block text-sm mb-1 opacity-70">Isi Pesan / Quote</label>
            <textarea id="in-text" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 focus:outline-none focus:border-blue-500" placeholder="Ketik sesuatu..."></textarea>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm mb-1 opacity-70">Operator</label>
                <input type="text" id="in-operator" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2" value="Telkomsel">
            </div>
            <div>
                <label class="block text-sm mb-1 opacity-70">Baterai (%)</label>
                <input type="number" id="in-battery" class="w-full bg-slate-800 border border-slate-700 rounded-lg p-2" value="100">
            </div>
        </div>

        <button onclick="takeScreenshot()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-blue-900/20">
            Simpan Gambar ✨
        </button>
    </div>

    <script>
        // Update Preview Real-time
        const inText = document.getElementById('in-text');
        const inOperator = document.getElementById('in-operator');
        const inBattery = document.getElementById('in-battery');

        const prevText = document.getElementById('prev-text');
        const prevOperator = document.getElementById('prev-operator');
        const prevBattery = document.getElementById('prev-battery');
        const prevTime = document.getElementById('prev-time');

        // Set waktu otomatis
        const now = new Date();
        prevTime.innerText = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');

        inText.addEventListener('input', () => prevText.innerText = inText.value || "Masukkan kutipan Anda...");
        inOperator.addEventListener('input', () => prevOperator.innerText = inOperator.value);
        inBattery.addEventListener('input', () => prevBattery.innerText = inBattery.value + "%");

        // Fungsi Download
        function takeScreenshot() {
            const element = document.getElementById('canvas-area');
            html2canvas(element, {
                backgroundColor: null,
                scale: 3 // Kualitas HD
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'quote-keren.png';
                link.href = canvas.toDataURL("image/png");
                link.click();
            });
        }
    </script>
</body>
</html>
