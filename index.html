<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IQC Style</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;
background:url("https://i.imgur.com/8Km9tLL.jpg") center/cover no-repeat;
}

.blur{
position:absolute;
inset:0;
backdrop-filter:blur(35px);
background:rgba(0,0,0,0.4);
}

/* CHAT AREA */
.container{
position:relative;
z-index:2;
width:100%;
max-width:500px;
height:100%;
padding-top:120px;
display:flex;
justify-content:center;
}

/* MESSAGE WRAP */
.message-wrap{
position:relative;
display:flex;
align-items:center;
gap:12px;
}

/* REACTION */
.reaction{
background:#000;
padding:8px 14px;
border-radius:25px;
display:flex;
gap:8px;
font-size:18px;
}

/* BUBBLE */
.bubble{
background:#000;
color:white;
padding:14px 18px;
border-radius:25px;
font-size:18px;
min-width:90px;
text-align:center;
}

/* TIME */
.time{
font-size:13px;
opacity:0.6;
margin-top:4px;
}

/* CONTROLS */
.controls{
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
width:90%;
max-width:350px;
background:#000;
padding:20px;
border-radius:25px;
box-shadow:0 20px 50px rgba(0,0,0,0.6);
}

input,textarea{
width:100%;
padding:12px;
border:none;
border-radius:15px;
margin-bottom:10px;
background:#222;
color:white;
font-size:16px;
}

textarea{resize:none;height:80px;}

button{
width:100%;
padding:14px;
border:none;
border-radius:20px;
background:linear-gradient(90deg,#ff00cc,#0026ff);
color:white;
font-size:18px;
font-weight:bold;
margin-top:8px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="blur"></div>

<div class="container" id="capture">

<div class="message-wrap">

<div class="reaction">
👍 ❤️ 😂 😮 😢 🙏
</div>

<div>
<div class="bubble" id="chatText">halo</div>
<div class="time" id="chatTime">05.07</div>
</div>

</div>

</div>

<div class="controls">
<input type="time" id="inputTime">
<textarea id="inputMsg">halo</textarea>
<button onclick="generate()">Generate</button>
<button onclick="downloadImage()">Simpan PNG</button>
</div>

<script>
function generate(){
let msg=document.getElementById("inputMsg").value;
let time=document.getElementById("inputTime").value;

if(time==""){
let now=new Date();
time=now.getHours().toString().padStart(2,'0')+"."+
now.getMinutes().toString().padStart(2,'0');
}else{
time=time.replace(":",".");
}

document.getElementById("chatText").innerText=msg;
document.getElementById("chatTime").innerText=time;
}

function downloadImage(){
html2canvas(document.getElementById("capture"),{scale:2}).then(canvas=>{
let link=document.createElement("a");
link.download="chat.png";
link.href=canvas.toDataURL();
link.click();
});
}
</script>

</body>
                              </html>
